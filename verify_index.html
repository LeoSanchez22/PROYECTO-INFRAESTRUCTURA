<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Horarios UPAO</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 0;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fff;
            box-sizing: border-box;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        
        .form-control::placeholder {
            color: #adb5bd;
        }
        
        .courses-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            border: 2px solid #dee2e6;
        }
        
        .courses-section h3 {
            margin: 0 0 20px 0;
            color: #495057;
            font-size: 1.3rem;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .login-card {
                padding: 30px 20px;
            }
            
            .two-column {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Generador de Horarios UPAO</h1>
        </header>
        
        <div class="login-card">
            <form id="loginForm">
                <div class="two-column">
                    <div class="form-group">
                        <label for="studentCode">👤 Código de Estudiante</label>
                        <input type="text" id="studentCode" class="form-control" placeholder="Ej: 2020123456" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">🔒 Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="Tu contraseña" required>
                    </div>
                </div>
                
                <div class="two-column">
                    <div class="form-group">
                        <label for="campusUrl">🌐 URL del Campus</label>
                        <input type="url" id="campusUrl" class="form-control" placeholder="https://matricula.upao.edu.pe/login" value="https://matricula.upao.edu.pe/login">
                    </div>
                    
                    <div class="form-group">
                        <label for="horariosUrl">📅 URL de Horarios</label>
                        <input type="url" id="horariosUrl" class="form-control" placeholder="https://matricula.upao.edu.pe/horarios" value="https://matricula.upao.edu.pe/horarios">
                    </div>
                </div>
                
                <div class="courses-section">
                    <h3>📚 Cursos a Consultar</h3>
                    <div class="form-group">
                        <label for="courses">Ingrese los códigos de sus cursos separados por comas:</label>
                        <input type="text" id="courses" class="form-control" placeholder="Ej: ISIA-109, ISIA-110, MATE-201" required>
                        <small style="color: #6c757d; font-size: 0.85rem; margin-top: 5px; display: block;">💡 Separe cada código de curso con una coma</small>
                    </div>
                </div>
                
                <button type="submit" class="btn">
                    ⚡ Generar Horario
                </button>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Aquí iría la lógica para procesar el formulario
            alert('🎉 Formulario enviado! (Esta es solo una demostración)');
        });
    </script>
</body>
</html>
