<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeoCorp Infrastructure Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 600px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #34495e;
            line-height: 1.6;
        }
        .status {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CloudFront Distribution Test</h1>
        <p>This is a test page to verify that the AWS infrastructure is working correctly.</p>
        <p>If you can see this page, it means:</p>
        <ul style="text-align: left;">
            <li>S3 bucket is configured correctly</li>
            <li>CloudFront distribution is working</li>
            <li>Access permissions are set up properly</li>
        </ul>
        <div class="status">ONLINE</div>
        <p style="margin-top: 20px;">Created: June 7, 2025</p>
    </div>

</html>
